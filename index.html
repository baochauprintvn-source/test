<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp cưới</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Montserrat;background:#000;color:#fff;overflow-x:hidden;}

/* INTRO */
#intro{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}
#intro button{
margin-top:20px;
padding:12px 25px;
background:#fff;
border:none;
}

/* HERO */
.hero{height:100vh;position:relative;}
.hero img{
width:100%;height:100%;object-fit:cover;
animation:zoom 15s infinite alternate;
}
@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}
.overlay{
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.4);
}
.hero-text{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
}
.hero-text h1{
font-family:Playfair Display;
font-size:32px;
animation:fadeUp 2s forwards;
}
.hero-text p{animation:fadeUp 2s forwards;}
@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
opacity:0;
transform:translateY(40px);
transition:1s;
}
.section.show{
opacity:1;
transform:translateY(0);
}

/* MAP */
iframe{width:100%;height:300px;border:0;border-radius:10px;}

/* ACTION BAR (NẰM NGANG GIỮA) */
.action-bar{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
padding:10px 15px;
border-radius:30px;
z-index:999;
}

/* PILL */
.pill{
display:flex;
align-items:center;
gap:6px;
padding:8px 14px;
border-radius:20px;
background:rgba(255,255,255,0.15);
color:#fff;
font-size:13px;
cursor:pointer;
white-space:nowrap;
transition:0.3s;
}
.pill:active{transform:scale(0.9);}

/* CIRCLE */
.circle{
width:36px;height:36px;
border-radius:50%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
font-size:16px;
position:relative;
cursor:pointer;
}
.circle:active{transform:scale(0.9);}

/* BADGE */
.count{
position:absolute;
top:-6px;
right:-6px;
background:#ff3b3b;
color:#fff;
font-size:10px;
padding:2px 5px;
border-radius:10px;
}

/* POPUP */
.popup{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
background:#fff;
color:#000;
padding:15px;
border-radius:10px;
display:none;
width:260px;
z-index:999;
}
.popup textarea{width:100%;margin:10px 0;}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h2>Thiệp cưới</h2>
  <button onclick="start()">Mở thiệp</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- HERO -->
<div class="hero">
  <img src="hero.jpg">
  <div class="overlay"></div>
  <div class="hero-text">
    <h1>ANH & LINH</h1>
    <p>20.10.2026</p>
  </div>
</div>

<div class="section">Câu chuyện tình yêu...</div>
<div class="section"><img src="1.jpg" width="100%"></div>
<div class="section">Lễ cưới 17h - Hà Nội</div>

<div class="section">
<iframe src="https://www.google.com/maps?q=Hanoi&output=embed"></iframe>
</div>

<!-- ACTION BAR -->
<div class="action-bar">

  <div class="pill" onclick="openWish()">💬 Gửi lời chúc</div>

  <div class="pill" onclick="react('🎆')">🎆 Hiệu ứng</div>

  <div class="pill" onclick="react('💗')">💗 Thả tim</div>

  <div class="circle" onclick="openGift()">🎁</div>

  <div class="circle" onclick="toggleMusic()">🔊</div>

  <div class="circle">
    👍
    <span class="count">99</span>
  </div>

</div>

<!-- POPUP -->
<div id="wishBox" class="popup">
  <h3>Gửi lời chúc</h3>
  <textarea id="wishText"></textarea>
  <button onclick="sendWish()">Gửi</button>
</div>

<div id="giftBox" class="popup">
  <h3>Mừng cưới</h3>
  <p>MB Bank: 0986323455</p>
  <p>Chủ TK: tran dâng luan</p>
</div>

<script>

/* START */
function start(){
document.getElementById("intro").style.display="none";
music.play();
autoScroll();
}

/* AUTO SCROLL */
function autoScroll(){
let total=document.body.scrollHeight;
let current=0;
let scroll=setInterval(()=>{
current+=2;
window.scrollTo(0,current);
if(current>=total) clearInterval(scroll);
},20);
}

/* SCROLL EFFECT */
const sections=document.querySelectorAll('.section');
window.addEventListener('scroll',()=>{
sections.forEach(sec=>{
if(sec.getBoundingClientRect().top<window.innerHeight-100){
sec.classList.add('show');
}
});
});

/* MUSIC */
function toggleMusic(){
music.paused?music.play():music.pause();
}

/* POPUP */
function openWish(){wishBox.style.display="block";}
function openGift(){giftBox.style.display="block";}

/* WISH */
function sendWish(){
alert("Đã gửi lời chúc ❤️");
wishBox.style.display="none";
}

/* REACT */
function react(icon){
alert("Bạn đã thả "+icon);
}

</script>

</body>
</html>
