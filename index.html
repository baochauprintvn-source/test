<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thiệp cưới</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Montserrat;background:#000;color:#fff;overflow-x:hidden;}

/* INTRO */
#intro{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
}
#intro button{
margin-top:20px;
padding:12px 25px;
background:#fff;
border:none;
}

/* HERO */
.hero{height:100vh;position:relative;}
.hero img{
width:100%;height:100%;object-fit:cover;
animation:zoom 15s infinite alternate;
}
@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}
.overlay{
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.4);
}
.hero-text{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
text-align:center;
}
.hero-text h1{
font-family:Playfair Display;
font-size:32px;
animation:fadeUp 2s forwards;
}
.hero-text p{
animation:fadeUp 2s forwards;
}
@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* SECTION */
.section{
padding:60px 20px;
text-align:center;
opacity:0;
transform:translateY(40px);
transition:1s;
}
.section.show{
opacity:1;
transform:translateY(0);
}

/* FLOAT UI */
.top-left,.top-right{
position:fixed;
top:15px;
width:40px;height:40px;
background:#fff;color:#000;
display:flex;align-items:center;justify-content:center;
border-radius:50%;
z-index:999;
}
.top-left{left:15px;}
.top-right{right:15px;}

.bottom-left{
position:fixed;
bottom:20px;left:15px;
display:flex;flex-direction:column;gap:10px;
}
.bottom-left button{
width:45px;height:45px;
border-radius:50%;border:none;
background:#fff;font-size:18px;
}

/* POPUP */
.popup{
position:fixed;
bottom:80px;left:20px;
background:#fff;color:#000;
padding:15px;
border-radius:10px;
display:none;
width:250px;
z-index:999;
}
.popup textarea{width:100%;margin:10px 0;}

/* MAP */
iframe{width:100%;height:300px;border:0;border-radius:10px;}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h2>Thiệp cưới</h2>
  <button onclick="start()">Mở thiệp</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="music.mp3">
</audio>

<!-- FLOAT UI -->
<div class="top-left" onclick="startMusic()">▶</div>
<div class="top-right" onclick="toggleMusic()">🔊</div>

<div class="bottom-left">
  <button onclick="openWish()">💬</button>
  <button onclick="openGift()">🎁</button>
  <button onclick="react('❤️')">❤️</button>
  <button onclick="react('👍')">👍</button>
</div>

<!-- POPUP -->
<div id="wishBox" class="popup">
  <h3>Lời chúc</h3>
  <textarea id="wishText"></textarea>
  <button onclick="sendWish()">Gửi</button>
</div>

<div id="giftBox" class="popup">
  <h3>Mừng cưới</h3>
  <p>MB Bank: 123456789</p>
  <p>Chủ TK: ANH</p>
</div>

<!-- HERO -->
<div class="hero">
  <img src="hero.jpg">
  <div class="overlay"></div>
  <div class="hero-text">
    <h1>ANH & LINH</h1>
    <p>20.10.2026</p>
  </div>
</div>

<div class="section">Câu chuyện tình yêu...</div>
<div class="section"><img src="1.jpg" width="100%"></div>
<div class="section">Lễ cưới 17h - Hà Nội</div>

<div class="section">
<iframe src="https://www.google.com/maps?q=Hanoi&output=embed"></iframe>
</div>

<script>

/* START */
function start(){
  document.getElementById("intro").style.display="none";
  music.play();
  autoScroll();
}

/* AUTO SCROLL */
function autoScroll(){
  let totalHeight = document.body.scrollHeight;
  let current = 0;

  let scroll = setInterval(()=>{
    current += 2;
    window.scrollTo(0,current);
    if(current >= totalHeight){
      clearInterval(scroll);
    }
  },20);
}

/* SCROLL EFFECT */
const sections=document.querySelectorAll('.section');
window.addEventListener('scroll',()=>{
sections.forEach(sec=>{
if(sec.getBoundingClientRect().top<window.innerHeight-100){
sec.classList.add('show');
}
});
});

/* MUSIC */
function startMusic(){music.play();}
function toggleMusic(){
music.paused?music.play():music.pause();
}

/* POPUP */
function openWish(){wishBox.style.display="block";}
function openGift(){giftBox.style.display="block";}

/* WISH */
function sendWish(){
let text=document.getElementById("wishText").value;
alert("Đã gửi: "+text);
wishBox.style.display="none";
}

/* REACT */
function react(icon){
alert("Bạn đã thả "+icon);
}

</script>

</body>
</html>
